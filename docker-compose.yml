services:
  api:
    image: orgmembershipservice.api
    build:
      context: .
      dockerfile: src/OrgMembershipService.Api/Dockerfile
    ports:
      - '8080:8080'
      - '8081:8081'
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=5432;User Id=postgres;Password=postgres;Database=OrgMembership;
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: OrgMembership
    volumes:
      - pg-data:/var/lib/postgresql
    ports:
      - '5434:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}' ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pg-data: